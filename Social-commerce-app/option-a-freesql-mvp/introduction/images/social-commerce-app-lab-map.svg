<svg xmlns="http://www.w3.org/2000/svg" width="1322" height="844" viewBox="0 0 1322 844" role="img" aria-label="Social Commerce app with LiveLabs tab mapping">
  <defs>
    <style>
      .title { font: 700 22px -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif; fill: #eaf6ff; }
      .badge { font: 700 16px -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif; fill: #f4f6f8; }
      .note { font: 600 15px -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif; fill: #ffb3b3; }
    </style>
  </defs>

  <image href="social-commerce-app.png" x="0" y="0" width="1322" height="844" />

  <rect x="280" y="24" width="420" height="44" rx="12" fill="rgba(15,20,28,0.86)" stroke="#49b6ff" stroke-width="2" />
  <text x="302" y="53" class="title">LiveLabs Mapping to Left Navigation</text>

  <!-- Welcome -->
  <line x1="252" y1="96" x2="284" y2="96" stroke="#6ec8ff" stroke-width="2" />
  <rect x="288" y="81" width="104" height="30" rx="9" fill="rgba(16,19,25,0.90)" stroke="#ff8f3f" stroke-width="2" />
  <text x="322" y="101" class="badge">Intro</text>

  <!-- Schema & Data -->
  <line x1="252" y1="132" x2="284" y2="132" stroke="#6ec8ff" stroke-width="2" />
  <rect x="288" y="117" width="104" height="30" rx="9" fill="rgba(16,19,25,0.90)" stroke="#00b894" stroke-width="2" />
  <text x="322" y="137" class="badge">Lab 1</text>

  <!-- Dashboard -->
  <line x1="252" y1="168" x2="284" y2="168" stroke="#6ec8ff" stroke-width="2" />
  <rect x="288" y="153" width="104" height="30" rx="9" fill="rgba(16,19,25,0.90)" stroke="#00b894" stroke-width="2" />
  <text x="322" y="173" class="badge">Lab 2</text>

  <!-- Social Vector Trends -->
  <line x1="252" y1="204" x2="284" y2="204" stroke="#6ec8ff" stroke-width="2" />
  <rect x="288" y="189" width="104" height="30" rx="9" fill="rgba(16,19,25,0.90)" stroke="#00b894" stroke-width="2" />
  <text x="322" y="209" class="badge">Lab 3</text>

  <!-- Influencer Graph -->
  <line x1="252" y1="241" x2="284" y2="241" stroke="#6ec8ff" stroke-width="2" />
  <rect x="288" y="226" width="104" height="30" rx="9" fill="rgba(16,19,25,0.90)" stroke="#00b894" stroke-width="2" />
  <text x="322" y="246" class="badge">Lab 4</text>

  <!-- Fulfillment Map -->
  <line x1="252" y1="278" x2="284" y2="278" stroke="#6ec8ff" stroke-width="2" />
  <rect x="288" y="263" width="104" height="30" rx="9" fill="rgba(16,19,25,0.90)" stroke="#00b894" stroke-width="2" />
  <text x="322" y="283" class="badge">Lab 5</text>

  <!-- Orders -->
  <line x1="252" y1="315" x2="284" y2="315" stroke="#6ec8ff" stroke-width="2" />
  <rect x="288" y="300" width="104" height="30" rx="9" fill="rgba(16,19,25,0.90)" stroke="#00b894" stroke-width="2" />
  <text x="322" y="320" class="badge">Lab 6</text>

  <!-- OML Analytics -->
  <line x1="252" y1="352" x2="284" y2="352" stroke="#6ec8ff" stroke-width="2" />
  <rect x="288" y="337" width="176" height="30" rx="9" fill="rgba(16,19,25,0.90)" stroke="#e05a5a" stroke-width="2" />
  <text x="306" y="357" class="badge">Omitted (FreeSQL)</text>

  <!-- Ask Your Data -->
  <line x1="252" y1="389" x2="284" y2="389" stroke="#6ec8ff" stroke-width="2" />
  <rect x="288" y="374" width="104" height="30" rx="9" fill="rgba(16,19,25,0.90)" stroke="#00b894" stroke-width="2" />
  <text x="322" y="394" class="badge">Lab 8</text>

  <!-- Agent Console -->
  <line x1="252" y1="426" x2="284" y2="426" stroke="#6ec8ff" stroke-width="2" />
  <rect x="288" y="411" width="104" height="30" rx="9" fill="rgba(16,19,25,0.90)" stroke="#00b894" stroke-width="2" />
  <text x="322" y="431" class="badge">Lab 9</text>

  <rect x="280" y="452" width="510" height="42" rx="10" fill="rgba(15,20,28,0.86)" stroke="#5a5a5a" stroke-width="1" />
  <text x="300" y="479" class="note">Lab 10 Cleanup is workshop-only and does not map to an app tab.</text>
</svg>
