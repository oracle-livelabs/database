  <text x="15" y="60" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1f1f1f">Reservation Information</text>
  <rect x="665" y="32" width="39" height="40" fill="#fff" stroke="#111" stroke-dasharray="3 3"/>
  <path d="M679 46l13 13m0-13l-13 13" stroke="#111" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="0" y1="82" x2="708" y2="82" stroke="#e6e6e6"/>

  <g filter="url(#softShadow)">
    <rect x="15" y="100" width="688" height="268" rx="6" fill="#fff"/>
  </g>
  <rect x="15" y="100" width="688" height="49" rx="6" fill="#74807e"/>
  <path d="M32 120l11 0-5.5 8z" fill="#111"/>
  <text x="60" y="131" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#fff">Terraform Outputs</text>

  <line x1="15" y1="149" x2="703" y2="149" stroke="#d8d8d8"/>
  <line x1="124" y1="149" x2="124" y2="368" stroke="#e6e6e6"/>
  <line x1="550" y1="149" x2="550" y2="368" stroke="#e6e6e6"/>
  <line x1="15" y1="221" x2="703" y2="221" stroke="#e6e6e6"/>
  <line x1="15" y1="294" x2="703" y2="294" stroke="#e6e6e6"/>

  <g font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#202020">
    <text x="23" y="190">1 - Login</text>
    <text x="133" y="190">LLUSER</text>
    <text x="23" y="263">2 - Password</text>
    <text x="133" y="263">F</text>
