    <text x="518" y="336">aclec</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#202020">
    <rect x="580" y="159" width="93" height="53" rx="4" fill="#f0f0f0"/>
    <path d="M604 176h12l6 6v16h-18z" fill="none" stroke="#111" stroke-width="1.5"/>
    <path d="M615 176v7h7" fill="none" stroke="#111" stroke-width="1.5"/>
