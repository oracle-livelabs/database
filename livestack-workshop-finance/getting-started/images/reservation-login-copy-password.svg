<svg xmlns="http://www.w3.org/2000/svg" width="708" height="400" viewBox="0 0 708 400" role="img" aria-labelledby="title desc">
  <title id="title">Reservation Information Copy Password button highlighted</title>
  <desc id="desc">Reservation Information dialog with the Copy button highlighted in the Password row.</desc>
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.16"/>
    </filter>
    <filter id="blurred" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="708" height="400" fill="#f4f2f0"/>
