  <g font-family="Menlo, Consolas, monospace" font-size="13">
    <text x="399" y="96" fill="#0000cc">JOIN</text><text x="434" y="96" fill="#111"> schema_ctx s </text><text x="539" y="96" fill="#0000cc">ON</text><text x="562" y="96" fill="#111"> s.owner_name = c.</text><rect x="660" y="83" width="55" height="18" rx="3" fill="#dce8f6"/><text x="662" y="96" fill="#0000cc">owner</text>
    <text x="399" y="116" fill="#0000cc">WHERE</text><text x="444" y="116" fill="#111"> c.data_type = </text><text x="548" y="116" fill="#e00000">'VECTOR'</text>
    <text x="421" y="134" fill="#0000cc">AND</text><text x="454" y="134" fill="#111"> c.table_name </text><text x="552" y="134" fill="#0000cc">IN</text><text x="575" y="134" fill="#111"> (</text><text x="587" y="134" fill="#e00000">'PRODUCT_EMBEDDINGS','POST_EMBEDDINGS'</text><text x="846" y="134" fill="#111">)</text>
    <text x="421" y="153" fill="#0000cc">AND</text><text x="454" y="153" fill="#111"> c.column_name = </text><text x="565" y="153" fill="#e00000">'EMBEDDING'</text>
    <text x="399" y="172" fill="#0000cc">UNION ALL</text>
    <text x="399" y="190" fill="#0000cc">SELECT</text><text x="454" y="190" fill="#111"> </text><text x="463" y="190" fill="#e00000">'Agent tool functions'</text><text x="616" y="190" fill="#111">, </text><text x="631" y="190" fill="#0000cc">COUNT</text><text x="671" y="190" fill="#111">(*)</text>
    <text x="399" y="210" fill="#0000cc">FROM</text><text x="435" y="210" fill="#111"> all_objects o</text>
    <text x="399" y="229" fill="#0000cc">JOIN</text><text x="434" y="229" fill="#111"> schema_ctx s </text><text x="539" y="229" fill="#0000cc">ON</text><text x="562" y="229" fill="#111"> s.owner_name = o.</text><rect x="660" y="216" width="55" height="18" rx="3" fill="#dce8f6"/><text x="662" y="229" fill="#0000cc">owner</text>
    <text x="399" y="249" fill="#0000cc">WHERE</text><text x="444" y="249" fill="#111"> o.object_type = </text><text x="553" y="249" fill="#e00000">'FUNCTION'</text>
    <text x="421" y="268" fill="#0000cc">AND</text><text x="454" y="268" fill="#111"> o.object_name </text><text x="560" y="268" fill="#0000cc">IN</text><text x="582" y="268" fill="#111"> (</text>
    <text x="443" y="287" fill="#e00000">'DETECT_TRENDING_PRODUCTS','CHECK_PRODUCT_INVENTORY',</text>
    <text x="443" y="306" fill="#e00000">'FIND_BEST_FULFILLMENT','GET_INFLUENCER_NETWORK','LOG_AGENT_DECISION'</text>
    <text x="421" y="325" fill="#111">);</text>
  </g>

