<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Creator graph flow</title>
  <desc id="desc">Creator, studio, post, and content relationships form a property graph.</desc>
  <rect width="900" height="360" rx="18" fill="#faf9f7"/>
  <text x="36" y="48" font-family="Arial" font-size="24" font-weight="700" fill="#312d2a">Creator influence as graph evidence</text>
  <g font-family="Arial" font-size="15" fill="#374151">
    <circle cx="145" cy="170" r="52" fill="#fff" stroke="#c74634" stroke-width="2"/><text x="105" y="176">Creator</text>
    <circle cx="360" cy="110" r="52" fill="#fff" stroke="#d8d2c8" stroke-width="2"/><text x="326" y="116">Studio</text>
    <circle cx="360" cy="235" r="52" fill="#fff" stroke="#d8d2c8" stroke-width="2"/><text x="328" y="241">Signal</text>
    <circle cx="585" cy="170" r="56" fill="#fff7ed" stroke="#c74634" stroke-width="2"/><text x="535" y="176">Content asset</text>
    <rect x="690" y="96" width="172" height="150" rx="14" fill="#fff" stroke="#d8d2c8"/>
    <text x="715" y="132" font-weight="700">SQL/PGQ result</text>
    <text x="715" y="164">connected creators</text>
    <text x="715" y="192">relationship type</text>
    <text x="715" y="220">business reach</text>
  </g>
  <path d="M195 156c42-40 72-48 112-48" stroke="#7a3e2f" stroke-width="4" fill="none"/>
  <path d="M195 188c42 40 72 48 112 48" stroke="#7a3e2f" stroke-width="4" fill="none"/>
  <path d="M414 120c55 18 75 30 118 44" stroke="#7a3e2f" stroke-width="4" fill="none"/>
  <path d="M414 226c55-18 75-30 118-44" stroke="#7a3e2f" stroke-width="4" fill="none"/>
  <path d="M644 170h30" stroke="#7a3e2f" stroke-width="5" stroke-linecap="round"/><path d="M670 154l24 16-24 16z" fill="#7a3e2f"/>
  <text x="64" y="316" font-family="Arial" font-size="15" fill="#6b7280">The graph is a queryable view over governed tables, not a disconnected social-network copy.</text>
</svg>