<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="666" viewBox="0 0 1280 666" role="img" aria-labelledby="title desc">
  <title id="title">Before and After: Media Data Architecture</title>
  <desc id="desc">A Finance-style Oracle Redwood diagram comparing fragmented media data stores with one Oracle Database 26ai foundation.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#263238" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L11,7 L2,12 Z" fill="#587083"/>
    </marker>
  </defs>
  <rect width="1280" height="666" fill="#f6f7f9"/>

  <text x="50" y="54" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1f2933">Before and After: Media Data Architecture</text>
  <text x="50" y="86" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#52616d">Fragmented media systems copy data between specialist stores. Oracle Database 26ai keeps rows, documents, vectors, graphs, spatial coverage, and ML together.</text>

  <rect x="48" y="124" width="520" height="384" rx="18" fill="#ffffff" stroke="#d7dde3" filter="url(#shadow)"/>
  <text x="78" y="165" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#263238">Before: Separate Specialist Stores</text>
  <text x="78" y="192" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5f6f7b">Each media workload asks for a different copy, pipeline, and access model.</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="78" y="222" width="142" height="68" rx="12" fill="#eef3f7" stroke="#ccd6dd"/>
    <text x="149" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#263238">Relational</text>
    <text x="149" y="273" text-anchor="middle" font-size="12" fill="#65737e">Content rows</text>

    <rect x="239" y="222" width="142" height="68" rx="12" fill="#f5f0e6" stroke="#ded4bd"/>
    <text x="310" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#263238">Document</text>
    <text x="310" y="273" text-anchor="middle" font-size="12" fill="#65737e">Campaign JSON</text>

    <rect x="400" y="222" width="142" height="68" rx="12" fill="#eef6f2" stroke="#cfe0d7"/>
    <text x="471" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#263238">Vector</text>
    <text x="471" y="273" text-anchor="middle" font-size="12" fill="#65737e">Audience meaning</text>

    <rect x="78" y="310" width="142" height="68" rx="12" fill="#f2f2f8" stroke="#d6d6e8"/>
    <text x="149" y="338" text-anchor="middle" font-size="15" font-weight="700" fill="#263238">Graph</text>
    <text x="149" y="361" text-anchor="middle" font-size="12" fill="#65737e">Creator links</text>

    <rect x="239" y="310" width="142" height="68" rx="12" fill="#eef5f7" stroke="#cde0e5"/>
    <text x="310" y="338" text-anchor="middle" font-size="15" font-weight="700" fill="#263238">Spatial</text>
    <text x="310" y="361" text-anchor="middle" font-size="12" fill="#65737e">Rights coverage</text>

    <rect x="400" y="310" width="142" height="68" rx="12" fill="#f7f0f2" stroke="#e3ccd3"/>
    <text x="471" y="338" text-anchor="middle" font-size="15" font-weight="700" fill="#263238">ML Store</text>
    <text x="471" y="361" text-anchor="middle" font-size="12" fill="#65737e">Forecast scores</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#33424d" font-size="14">
    <circle cx="86" cy="417" r="4" fill="#6d7f8f"/><text x="100" y="422">Data copied and synchronized between systems</text>
    <circle cx="86" cy="447" r="4" fill="#6d7f8f"/><text x="100" y="452">Security rules rebuilt in multiple products</text>
    <circle cx="86" cy="477" r="4" fill="#6d7f8f"/><text x="100" y="482">Pipelines add delay, drift, and failure points</text>
  </g>

  <line x1="598" y1="316" x2="677" y2="316" stroke="#587083" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="638" y="292" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#587083">converge</text>

  <rect x="710" y="124" width="520" height="384" rx="18" fill="#ffffff" stroke="#d7dde3" filter="url(#shadow)"/>
  <text x="740" y="165" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#263238">After: Oracle Converged Database</text>
  <text x="740" y="192" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5f6f7b">One governed foundation serves the application, SQL evidence, and AI decisions.</text>

  <rect x="782" y="228" width="376" height="110" rx="22" fill="#f1f7f8" stroke="#b9d3d8"/>
  <text x="970" y="276" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#174a5b">Oracle Database 26ai</text>
  <text x="970" y="307" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#47606c">Rows, JSON, vectors, graph, spatial, ML, security</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#263238">
    <rect x="755" y="368" width="135" height="38" rx="19" fill="#eef3f7" stroke="#ccd6dd"/><text x="822" y="392" text-anchor="middle">SQL views</text>
    <rect x="902" y="368" width="135" height="38" rx="19" fill="#f5f0e6" stroke="#ded4bd"/><text x="970" y="392" text-anchor="middle">JSON duality</text>
    <rect x="1049" y="368" width="135" height="38" rx="19" fill="#eef6f2" stroke="#cfe0d7"/><text x="1116" y="392" text-anchor="middle">Vector search</text>
    <rect x="755" y="421" width="135" height="38" rx="19" fill="#f2f2f8" stroke="#d6d6e8"/><text x="822" y="445" text-anchor="middle">Property graph</text>
    <rect x="902" y="421" width="135" height="38" rx="19" fill="#eef5f7" stroke="#cde0e5"/><text x="970" y="445" text-anchor="middle">Spatial SQL</text>
    <rect x="1049" y="421" width="135" height="38" rx="19" fill="#f7f0f2" stroke="#e3ccd3"/><text x="1116" y="445" text-anchor="middle">OML scoring</text>
  </g>

  <rect x="48" y="540" width="1182" height="88" rx="18" fill="#ffffff" stroke="#d7dde3"/>
  <text x="78" y="575" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#263238">What changes for Seer Media</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#33424d">
    <circle cx="88" cy="605" r="5" fill="#2f7d69"/><text x="104" y="610">One governed source for media evidence</text>
    <circle cx="382" cy="605" r="5" fill="#2f7d69"/><text x="398" y="610">Consistent security, auditing, and access control</text>
    <circle cx="748" cy="605" r="5" fill="#2f7d69"/><text x="764" y="610">SQL works across media data types and AI features</text>
  </g>
</svg>