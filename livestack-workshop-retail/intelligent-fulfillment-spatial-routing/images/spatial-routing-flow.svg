<polygon points="321,196 309,188 309,204" class="accent"/>
<rect x="320" y="104" width="250" height="185" rx="12" class="panel"/>
<rect x="320" y="104" width="250" height="38" rx="12" fill="#2f6f73"/>
<text x="338" y="129" class="head" fill="#fff">Distance SQL</text>
