<rect x="338" y="180" width="214" height="25" rx="6" class="chip"/>
<text x="350" y="197" class="item">unit=MILE</text>
<rect x="338" y="211" width="214" height="25" rx="6" class="chip"/>
<text x="350" y="228" class="item">Nearest active centers</text>
<rect x="338" y="242" width="214" height="25" rx="6" class="chip"/>
