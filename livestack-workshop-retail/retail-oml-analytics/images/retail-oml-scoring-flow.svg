<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
<style>
.bg{fill:#f7f6f2}.panel{fill:#fff;stroke:#d7d2ca;stroke-width:1.5}.title{font-family:Arial,sans-serif;font-size:25px;font-weight:700;fill:#161513}.sub{font-family:Arial,sans-serif;font-size:14px;fill:#4b4741}.head{font-family:Arial,sans-serif;font-size:16px;font-weight:700;fill:#312d2a}.item{font-family:Arial,sans-serif;font-size:13px;fill:#312d2a}.chip{fill:#eef4f2;stroke:#b9c9c2;stroke-width:1}.foot{font-family:Arial,sans-serif;font-size:15px;font-weight:700;fill:#fff}.accent{fill:#8f4235}.arrow{stroke:#8f4235;stroke-width:4;stroke-linecap:round}
