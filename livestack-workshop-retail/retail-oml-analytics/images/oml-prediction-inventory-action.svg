<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Demand surge prediction and inventory action interpretation</title>
  <desc id="desc">A predicted demand surge and at-risk inventory combine into a replenishment action list.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#4b5563"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="920" height="360" fill="#f8fafc"/>
  <text x="460" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111827">How to Read the OML Action List</text>
  <text x="460" y="64" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5563">A product becomes urgent when predicted demand pressure meets current inventory risk.</text>

  <g filter="url(#shadow)">
    <rect x="58" y="106" width="230" height="138" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="346" y="106" width="230" height="138" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="634" y="106" width="230" height="138" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  </g>

  <rect x="58" y="106" width="230" height="34" rx="8" fill="#ede9fe"/>
  <text x="173" y="129" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#111827">Model Signal</text>
  <text x="82" y="166" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">Predicted = SURGE</text>
  <text x="82" y="190" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">Surge probability is high</text>
  <text x="82" y="214" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">Demand may accelerate</text>

  <rect x="346" y="106" width="230" height="34" rx="8" fill="#fef3c7"/>
  <text x="461" y="129" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#111827">Inventory Evidence</text>
  <text x="370" y="166" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">On Hand is low</text>
  <text x="370" y="190" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">On Hand &lt; Reorder At</text>
  <text x="370" y="214" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">Risk = AT_RISK</text>

  <rect x="634" y="106" width="230" height="34" rx="8" fill="#dcfce7"/>
  <text x="749" y="129" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#111827">Business Response</text>
  <text x="658" y="166" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">Replenish earlier</text>
  <text x="658" y="190" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">Protect available stock</text>
  <text x="658" y="214" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#334155">Review promotions</text>

  <line x1="298" y1="175" x2="336" y2="175" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="586" y1="175" x2="624" y2="175" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="154" y="276" width="612" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="460" y="300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">Example: predicted surge plus low inventory</text>
  <text x="460" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">should move from analysis to action.</text>
</svg>
