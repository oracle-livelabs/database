  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#2f3b39">
    <rect x="42" y="438" width="660" height="34" rx="6" fill="#ffffff" stroke="#d4dcda"/>
    <text x="60" y="460">Read left to right: brand -> promoter creator -> creators reached through the promoter network.</text>
