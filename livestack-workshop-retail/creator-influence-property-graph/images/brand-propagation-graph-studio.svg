<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">Graph Studio-style brand propagation graph</title>
  <desc id="desc">ApexRide brand connected to promoter creators, who connect to reached creators.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f6f6d"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1f2f2d" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="980" height="500" rx="0" fill="#f6f7f7"/>
  <text x="36" y="42" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#1c2423">Brand propagation path</text>
  <text x="36" y="70" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4d5a58">A brand connects to promoter creators, and each promoter can reach other creator audiences through graph edges.</text>

  <g stroke="#5f6f6d" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M 236 238 C 300 160, 374 136, 444 132"/>
    <path d="M 236 262 C 300 324, 374 348, 444 354"/>
    <path d="M 604 126 C 664 92, 714 82, 784 82"/>
    <path d="M 608 144 C 670 156, 716 166, 784 168"/>
    <path d="M 608 342 C 670 296, 716 276, 784 266"/>
    <path d="M 608 364 C 670 392, 716 410, 784 412"/>
  </g>

  <g filter="url(#shadow)">
