    <text x="877" y="76" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#fff5e6">REACHED CREATOR</text>
    <text x="877" y="98" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#ffffff">@gear_mia_238</text>

