    <text x="359" y="184" text-anchor="middle">promotes: organic</text>

    <rect x="296" y="282" width="126" height="24" rx="5" fill="#ffffff" stroke="#d4dcda"/>
    <text x="359" y="298" text-anchor="middle">promotes: affiliate</text>

    <rect x="672" y="112" width="88" height="22" rx="5" fill="#ffffff" stroke="#d4dcda"/>
    <text x="716" y="127" text-anchor="middle">connects_to</text>

    <rect x="672" y="180" width="88" height="22" rx="5" fill="#ffffff" stroke="#d4dcda"/>
