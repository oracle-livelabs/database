    <text x="877" y="260" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#fff5e6">REACHED CREATOR</text>
    <text x="877" y="282" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#ffffff">@camp_faye_474</text>

    <rect x="782" y="376" width="190" height="70" rx="12" fill="#7a5c3a"/>
