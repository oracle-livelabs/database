    <text x="149" y="230" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#d8eef3">BRAND</text>
    <text x="149" y="260" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#ffffff">ApexRide</text>

    <rect x="438" y="90" width="220" height="86" rx="12" fill="#5a7d63"/>
    <text x="548" y="124" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ecf6ed">PROMOTER</text>
    <text x="548" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">@alpine_hope_381</text>

    <rect x="438" y="314" width="220" height="86" rx="12" fill="#5a7d63"/>
    <text x="548" y="348" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ecf6ed">PROMOTER</text>
    <text x="548" y="374" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">@alpine_mia_143</text>

