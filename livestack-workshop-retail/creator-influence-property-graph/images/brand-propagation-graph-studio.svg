    <text x="877" y="162" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#fff5e6">REACHED CREATOR</text>
    <text x="877" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#ffffff">@outdoor_kara_155</text>

