<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">JSON Relational Duality order flow</title>
  <desc id="desc">ORDERS and ORDER_ITEMS relational tables feed the ORDERS_DV JSON Relational Duality view, which presents one JSON order document.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#365f63"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="980" height="360" fill="#f7f8f7"/>
  <text x="490" y="36" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1f2933">One Order, Two Representations</text>
  <text x="490" y="64" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#4b5563">Relational rows stay the source of truth while ORDERS_DV presents the application-friendly JSON document.</text>

  <g filter="url(#shadow)">
    <rect x="55" y="98" width="230" height="88" rx="8" fill="#ffffff" stroke="#a7b4b6"/>
    <rect x="55" y="98" width="230" height="32" rx="8" fill="#dce6e6"/>
    <text x="170" y="121" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1f2933">ORDERS</text>
    <text x="78" y="151" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">ORDER_ID</text>
    <text x="78" y="171" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">CUSTOMER_ID</text>
    <text x="178" y="171" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">STATUS, TOTAL</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="55" y="218" width="230" height="88" rx="8" fill="#ffffff" stroke="#a7b4b6"/>
    <rect x="55" y="218" width="230" height="32" rx="8" fill="#dce6e6"/>
    <text x="170" y="241" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1f2933">ORDER_ITEMS</text>
    <text x="78" y="271" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">ITEM_ID, ORDER_ID</text>
    <text x="78" y="291" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">PRODUCT_ID</text>
    <text x="178" y="291" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#374151">QTY, PRICE</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="392" y="145" width="210" height="118" rx="8" fill="#ffffff" stroke="#8ca4aa"/>
    <rect x="392" y="145" width="210" height="36" rx="8" fill="#365f63"/>
    <text x="497" y="169" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#ffffff">ORDERS_DV</text>
    <text x="497" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#1f2933">JSON Relational</text>
    <text x="497" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#1f2933">Duality View</text>
    <text x="497" y="249" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4b5563">Maps rows to document shape</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="710" y="102" width="220" height="204" rx="8" fill="#ffffff" stroke="#a7b4b6"/>
    <rect x="710" y="102" width="220" height="36" rx="8" fill="#eef2f2"/>
    <text x="820" y="126" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1f2933">Order JSON Document</text>
    <text x="735" y="160" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1f2933">{</text>
    <text x="755" y="181" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1f2933">"_id": 1,</text>
    <text x="755" y="202" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1f2933">"customerId": 1668,</text>
    <text x="755" y="223" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1f2933">"status": "confirmed",</text>
    <text x="755" y="244" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1f2933">"items": [ ... ]</text>
    <text x="735" y="265" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1f2933">}</text>
  </g>

  <path d="M 285 142 C 330 142, 346 177, 386 177" fill="none" stroke="#365f63" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 285 262 C 330 262, 346 232, 386 232" fill="none" stroke="#365f63" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 602 204 C 648 204, 666 204, 704 204" fill="none" stroke="#365f63" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="334" y="132" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#365f63">header row</text>
  <text x="329" y="286" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#365f63">line item rows</text>
  <text x="641" y="192" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#365f63">one document</text>
</svg>
